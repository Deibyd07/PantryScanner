name: pantry_scanner
description: PantryScanner mobile app for inventory, barcode scanning and smart expiry alerts.
publish_to: "none"

version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0
  intl: ^0.20.0
  google_fonts: ^6.2.1

  # Data / persistence
  drift: ^2.20.0
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.4
  path: ^1.9.0

  # Networking
  dio: ^5.7.0

  # Scanner / device features
  mobile_scanner: ^5.2.3
  permission_handler: ^11.3.1
  flutter_local_notifications: ^17.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  drift_dev: ^2.20.1
  build_runner: ^2.4.12

flutter:
  uses-material-design: true
