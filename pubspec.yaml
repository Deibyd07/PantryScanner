name: pantry_scanner
description: PantryScanner mobile app for inventory, barcode scanning and smart expiry alerts.
publish_to: "none"

version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0
  intl: ^0.20.0
  google_fonts: ^6.2.1

  # Data / persistence
  path_provider: ^2.1.4
  path: ^1.9.0
  shared_preferences: ^2.3.2

  # Firebase
  firebase_core: ^3.8.1
  firebase_auth: ^5.4.1
  google_sign_in: ^6.2.2

  # Networking
  dio: ^5.7.0
  connectivity_plus: ^6.1.4
  cached_network_image: ^3.4.1

  # Scanner / device features
  mobile_scanner: ^5.2.3
  permission_handler: ^11.3.1
  flutter_local_notifications: ^17.2.2
  timezone: ^0.9.4
  image_picker: ^1.2.2
  sqflite: ^2.4.2+1
  cloud_firestore: ^5.6.12
  uuid: ^4.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.12
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/images/recipes/
    - assets/branding/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/branding/icon_full.png"
  min_sdk_android: 21
  remove_alpha_ios: true
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/branding/icon_symbol.png"
  adaptive_icon_monochrome: "assets/branding/icon_mono_inverted.png"
